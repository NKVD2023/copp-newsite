<script>
    // Табы страницы
    function showPageTab(tabId, btn) {
        // Убираем active со всех табов
        document.querySelectorAll('.project-tabs-nav .nav-link').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.project-tab-pane').forEach(el => el.classList.remove('active'));
        
        // Ставим active на кликнутый
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    // Параллакс фона
    document.addEventListener('mousemove', function(e) {
        const wrapper = document.getElementById('parallaxPageWrapper');
        if (!wrapper) return;
        
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = (e.clientY / window.innerHeight - 0.5) * 2;
        
        const elements = wrapper.querySelectorAll('[data-speed]');
        elements.forEach(el => {
            const speed = parseFloat(el.getAttribute('data-speed'));
            const moveX = x * speed * 10;
            const moveY = y * speed * 10;
            if (el.classList.contains('shape-dots') || el.classList.contains('shape-diagonal-grid')) {
                el.style.transform = `translate(${moveX}px, ${moveY}px) rotate(10deg)`;
            } else {
                el.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    });
</script>
