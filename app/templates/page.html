{% extends 'base.html' %}

{% block title %}{{ page.title }} - ЦОПП РК{% endblock %}

{% block extra_css %}
<style>
.page-container {
    background: white;
    border-radius: 15px;
    padding: 3rem 4rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    margin-bottom: 4rem;
}

@media (max-width: 768px) {
    .page-container {
        padding: 2rem 1.5rem;
    }
}

.page-header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #eef2f5;
}

.page-title {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--copp-blue);
    margin-bottom: 1rem;
    line-height: 1.3;
}

.page-content {
    font-size: 1.15rem;
    line-height: 1.8;
    color: #444;
}

/* Make sure lists inside content look good */
.page-content ul, .page-content ol {
    margin-bottom: 1.5rem;
    padding-left: 2rem;
}

.page-content p {
    margin-bottom: 1.5rem;
}

/* Tables from TinyMCE */
.page-content table {
    width: 100% !important;
    border-collapse: collapse;
    margin-bottom: 1.5rem;
}

.page-content table td, .page-content table th {
    border: 1px solid #ddd;
    padding: 10px 15px;
}

.page-content img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    margin-bottom: 1.5rem;
}
</style>
{% endblock %}

{% block content %}
<div style="padding: 2rem 0;">
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">{{ page.title }}</h1>
        </div>
        
        <div class="page-content">
            {{ page.content | safe }}
        </div>
    </div>
</div>
{% endblock %}
