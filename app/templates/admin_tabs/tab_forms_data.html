<div class="a-panel">
    <div class="a-panel-toolbar">
        <h6 class="a-panel-title mb-0" style="border:none;padding:0;"><i class="fas fa-table-list"></i> Сбор данных / Формы заявок</h6>
        <a href="#" id="exportBtn" class="a-btn a-btn-success a-btn-sm disabled" target="_blank">
            <i class="fas fa-file-excel"></i> Выгрузить в Excel
        </a>
    </div>

    <div class="a-form-group mb-3" style="max-width:420px;">
        <label class="a-label">Выберите форму</label>
        <select class="a-select" id="formFilter" onchange="filterSubmissions()">
            <option value="">Все формы...</option>
            {% for form in forms_list %}
                <option value="{{ form.id }}">
                    {{ form.title }} ({{ form.year }})
                    {% if form.status == 'archived' %} — В архиве{% elif form.status == 'hidden' %} — Скрыта{% else %} — Активна{% endif %}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="a-table-responsive" id="submissionsContainer">
        <div class="a-empty"><i class="fas fa-hand-pointer"></i><p>Выберите форму из списка, чтобы увидеть данные</p></div>
    </div>
</div>

<script>
const allSubmissions = [
    {% for sub in submissions_list %}
    {
        id: {{ sub.id }},
        form_id: {{ sub.form_id }},
        date: '{{ sub.created_at }}',
        data: JSON.parse({{ sub.submission_data|tojson|safe }})
    }{% if not loop.last %},{% endif %}
    {% endfor %}
];

function filterSubmissions() {
    const formId = document.getElementById('formFilter').value;
    const container = document.getElementById('submissionsContainer');
    const exportBtn = document.getElementById('exportBtn');
    
    if (!formId) {
        container.innerHTML = '<div class="a-empty"><i class="fas fa-hand-pointer"></i><p>Выберите форму из списка, чтобы увидеть данные</p></div>';
        exportBtn.classList.add('disabled');
        exportBtn.href = "#";
        return;
    }
    
    exportBtn.classList.remove('disabled');
    exportBtn.href = "/admin/export_submissions/" + formId;
    
    const filtered = allSubmissions.filter(s => s.form_id == formId);
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="a-empty"><i class="fas fa-inbox"></i><p>Для этой формы пока нет отправленных данных.</p></div>';
        return;
    }
    
    // Получаем все возможные колонки из JSON данных
    let columns = new Set();
    filtered.forEach(sub => {
        Object.keys(sub.data).forEach(k => columns.add(k));
    });
    columns = Array.from(columns);
    
    let html = '<table class="a-table">';
    html += '<thead><tr><th>Дата отправки</th>';
    columns.forEach(col => {
        html += `<th>${col}</th>`;
    });
    html += '<th>Действия</th></tr></thead><tbody>';
    
    filtered.forEach(sub => {
        html += `<tr><td>${sub.date}</td>`;
        columns.forEach(col => {
            html += `<td>${sub.data[col] || ''}</td>`;
        });
        html += `
            <td>
                <form action="/admin/delete_submission/${sub.id}" method="POST" onsubmit="return confirm('Удалить эту запись?');" style="display:inline;">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <button type="submit" class="a-btn a-btn-danger a-btn-sm"><i class="fas fa-trash"></i></button>
                </form>
            </td>
        </tr>`;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

// Автоматически выбираем первую форму при загрузке страницы, если она есть
document.addEventListener('DOMContentLoaded', function() {
    // Ждем небольшой таймаут, чтобы вкладка успела отрендериться, 
    // или проверяем, активна ли эта вкладка, чтобы не перерисовывать зря.
    // Если на дашборде выбран таб "forms_data", то выбираем первую форму
    const formFilter = document.getElementById('formFilter');
    if (formFilter && formFilter.options.length > 1) {
        formFilter.selectedIndex = 1; // Выбираем первую форму (0 - это "Выберите форму...")
        filterSubmissions(); // Принудительно вызываем обновление таблицы
    }
});
</script>
