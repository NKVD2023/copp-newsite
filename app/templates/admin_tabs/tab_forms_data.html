<div class="admin-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Сбор данных / Формы заявок</h5>
    </div>
    
    <div class="row mb-3">
        <div class="col-md-6">
            <select class="form-select" id="formFilter" onchange="filterSubmissions()">
                <option value="">Выберите форму...</option>
                {% for form in forms_list %}
                    <option value="{{ form.id }}">
                        {{ form.title }} ({{ form.year }}) 
                        {% if form.status == 'archived' %}[В архиве]{% elif form.status == 'hidden' %}[Скрыта]{% else %}[Активна]{% endif %}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6 text-end">
            <a href="#" id="exportBtn" class="btn btn-success disabled" target="_blank"><i class="fas fa-file-excel"></i> Выгрузить в Excel</a>
        </div>
    </div>

    <div class="table-responsive" id="submissionsContainer">
        <p class="text-muted text-center py-4">Выберите форму из списка, чтобы увидеть собранные данные.</p>
    </div>
</div>

<script>
const allSubmissions = [
    {% for sub in submissions_list %}
    {
        id: {{ sub.id }},
        form_id: {{ sub.form_id }},
        date: '{{ sub.created_at }}',
        data: {{ sub.submission_data|safe }}
    }{% if not loop.last %},{% endif %}
    {% endfor %}
];

function filterSubmissions() {
    const formId = document.getElementById('formFilter').value;
    const container = document.getElementById('submissionsContainer');
    const exportBtn = document.getElementById('exportBtn');
    
    if (!formId) {
        container.innerHTML = '<p class="text-muted text-center py-4">Выберите форму из списка, чтобы увидеть собранные данные.</p>';
        exportBtn.classList.add('disabled');
        exportBtn.href = "#";
        return;
    }
    
    exportBtn.classList.remove('disabled');
    exportBtn.href = "/admin/export_submissions/" + formId;
    
    const filtered = allSubmissions.filter(s => s.form_id == formId);
    
    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-muted text-center py-4">Для этой формы пока нет отправленных данных.</p>';
        return;
    }
    
    // Получаем все возможные колонки из JSON данных
    let columns = new Set();
    filtered.forEach(sub => {
        Object.keys(sub.data).forEach(k => columns.add(k));
    });
    columns = Array.from(columns);
    
    let html = '<table class="table table-hover table-bordered align-middle" style="font-size:0.9rem;">';
    html += '<thead class="table-light"><tr><th>Дата отправки</th>';
    columns.forEach(col => {
        html += `<th>${col}</th>`;
    });
    html += '<th>Действия</th></tr></thead><tbody>';
    
    filtered.forEach(sub => {
        html += `<tr><td>${sub.date}</td>`;
        columns.forEach(col => {
            html += `<td>${sub.data[col] || ''}</td>`;
        });
        html += `
            <td>
                <form action="/admin/delete_submission/${sub.id}" method="POST" onsubmit="return confirm('Вы уверены, что хотите удалить эту запись?');" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                </form>
            </td>
        </tr>`;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

// Автоматически выбираем первую форму при загрузке страницы, если она есть
document.addEventListener('DOMContentLoaded', function() {
    // Ждем небольшой таймаут, чтобы вкладка успела отрендериться, 
    // или проверяем, активна ли эта вкладка, чтобы не перерисовывать зря.
    // Если на дашборде выбран таб "forms_data", то выбираем первую форму
    const formFilter = document.getElementById('formFilter');
    if (formFilter && formFilter.options.length > 1) {
        formFilter.selectedIndex = 1; // Выбираем первую форму (0 - это "Выберите форму...")
        filterSubmissions(); // Принудительно вызываем обновление таблицы
    }
});
</script>
