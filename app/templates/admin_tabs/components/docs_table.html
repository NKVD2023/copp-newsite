<div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
    <table class="table table-hover align-middle table-sm border w-100">
        <thead class="table-light position-sticky top-0 z-1">
            <tr>
                <th>Файл</th>
                <th>Папка</th>
                <th>Размер</th>
                <th class="text-end">Действия</th>
            </tr>
        </thead>
        <tbody>
        {% set docs_exist = false %}
        {% for file in all_media_files if not file.is_image %}
        {% set docs_exist = true %}
        <tr class="media-item-searchable">
            <td class="search-text">
                <div class="fw-bold text-dark text-wrap text-break" style="max-width: 400px;">
                    <i class="fas fa-file me-2 text-muted"></i>{{ file.filename }}
                </div>
                <div class="small text-muted">{{ file.date_str }}</div>
            </td>
            <td><span class="badge bg-light text-dark"><i class="fas fa-folder me-1 text-secondary"></i>{{ file.folder }}</span></td>
            <td class="text-muted small">{{ file.size_kb }} KB</td>
            <td class="text-end">
                <div class="btn-group btn-group-sm">
                    <button type="button" class="btn btn-outline-secondary" onclick="copyLink('{{ url_for('static', filename=file.filepath) }}')" title="Копировать ссылку"><i class="fas fa-copy"></i></button>
                    <form action="{{ url_for('admin.delete_media') }}" method="POST" class="d-inline m-0 p-0" onsubmit="return confirm('Вы уверены? Если файл используется на сайте, он перестанет отображаться.');">
                        <input type="hidden" name="filepath" value="{{ file.filepath }}">
                        <button type="submit" class="btn btn-outline-secondary" title="Удалить"><i class="fas fa-trash"></i></button>
                    </form>
                </div>
            </td>
        </tr>
        {% endfor %}
        {% if not docs_exist %}
        <tr>
            <td colspan="4" class="text-center text-muted py-4">Нет загруженных документов</td>
        </tr>
        {% endif %}
        </tbody>
    </table>
</div>
