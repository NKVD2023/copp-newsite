<!-- tab_logs.html -->
<div class="card border-0 shadow-sm mt-3" style="border-radius: 0.5rem; border: 1px solid #e5e7eb !important;">
    
    <!-- Header: Верхняя панель -->
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center" style="border-bottom: 1px solid #f3f4f6;">
        <h5 class="mb-0 fw-bold" style="color: #1f2937; font-size: 1.125rem;">Журнал действий системы</h5>
        
        <div class="d-flex align-items-center gap-2">
            <!-- Поле поиска с иконкой -->
            <div class="position-relative">
                <i class="fas fa-search position-absolute top-50 start-0 translate-middle-y ms-3" style="color: #9ca3af; font-size: 0.875rem;"></i>
                <input 
                    type="text" 
                    id="customSearchInput"
                    placeholder="Поиск по журналу..." 
                    class="form-control form-control-sm"
                    style="padding-left: 2.25rem; padding-right: 1rem; padding-top: 0.375rem; padding-bottom: 0.375rem; border-color: #e5e7eb; border-radius: 0.375rem; width: 250px; font-size: 0.875rem; color: #4b5563;"
                >
            </div>
            
            <!-- Кнопка Excel -->
            <a href="{{ url_for('admin.export_logs') }}" class="btn btn-sm" style="color: #16a34a; border-color: #bbf7d0; background-color: transparent; font-weight: 500; padding: 0.375rem 0.75rem; border-radius: 0.375rem; display: flex; align-items: center; gap: 0.375rem;" onmouseover="this.style.backgroundColor='#f0fdf4'" onmouseout="this.style.backgroundColor='transparent'">
                <i class="fas fa-file-excel"></i> Excel
            </a>
            
            <!-- Кнопка Очистить -->
            <button onclick="clearLogs()" class="btn btn-sm" style="color: #ef4444; border-color: #fecaca; background-color: transparent; font-weight: 500; padding: 0.375rem 0.75rem; border-radius: 0.375rem; display: flex; align-items: center; gap: 0.375rem;" onmouseover="this.style.backgroundColor='#fef2f2'" onmouseout="this.style.backgroundColor='transparent'">
                <i class="fas fa-trash-alt"></i> Очистить
            </button>
        </div>
    </div>
    
    <!-- Table Container: Прокрутка -->
    <div class="card-body p-0">
        <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
            <table class="table align-middle table-hover mb-0 log-table" id="logsTable">
                <thead style="position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th width="12%" class="text-uppercase" style="font-size: 0.75rem; font-weight: 500; color: #6b7280; letter-spacing: 0.05em;">Дата и время</th>
                        <th width="18%" class="text-uppercase" style="font-size: 0.75rem; font-weight: 500; color: #6b7280; letter-spacing: 0.05em;">Пользователь</th>
                        <th width="12%" class="text-uppercase" style="font-size: 0.75rem; font-weight: 500; color: #6b7280; letter-spacing: 0.05em;">Действие</th>
                        <th width="48%" class="text-uppercase" style="font-size: 0.75rem; font-weight: 500; color: #6b7280; letter-spacing: 0.05em;">Подробности</th>
                        <th width="10%" class="text-uppercase" style="font-size: 0.75rem; font-weight: 500; color: #6b7280; letter-spacing: 0.05em;">IP-адрес</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr><td colspan="5" class="text-center py-5 text-muted">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination & Info -->
        <div class="logs-footer d-flex justify-content-between align-items-center" style="border-top: 1px solid #f3f4f6; padding: 0.75rem 1.5rem;">
            <div id="logsInfo" style="font-size: 0.85rem; color: #6b7280;">Ожидание данных...</div>
            <div id="logsPagination" class="d-flex gap-1"></div>
        </div>
    </div>
</div>

<style>
/* Структура и границы таблицы */
.log-table {
    border-collapse: separate;
    border-spacing: 0;
}
.log-table th, .log-table td {
    padding: 0.6rem 1rem !important; /* средние отступы */
    border-right: 1px solid #f3f4f6; /* тонкая светлая линия */
    border-bottom: 1px solid #f3f4f6 !important; /* тонкая светлая линия */
}
.log-table th:last-child, .log-table td:last-child {
    border-right: none;
}
/* Оформление шапки */
.log-table thead th {
    background-color: #ffffff !important; /* белый фон */
    border-bottom: 1px solid #e5e7eb !important;
}
/* Стилизация скроллбара для красоты */
.table-responsive::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
.table-responsive::-webkit-scrollbar-track {
    background: transparent; 
}
.table-responsive::-webkit-scrollbar-thumb {
    background: #d1d5db; 
    border-radius: 10px;
}
.table-responsive::-webkit-scrollbar-thumb:hover {
    background: #9ca3af; 
}
/* Пагинация */
.page-btn {
    padding: 0.25rem 0.75rem;
    border: 1px solid #e5e7eb;
    background: white;
    color: #4b5563;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
}
.page-btn:hover:not(:disabled) {
    background: #f9fafb;
}
.page-btn.active {
    background: #3b82f6;
    color: white;
    border-color: #3b82f6;
}
.page-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>

<script>
let logsCurrentPage = 1;
let logsSearchQuery = '';
let logsDebounceTimer;

function fetchLogs(page = 1) {
    logsCurrentPage = page;
    const url = `/admin/api/logs?page=${page}&search=${encodeURIComponent(logsSearchQuery)}`;
    
    const tbody = document.getElementById('logsTableBody');
    if(tbody) tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">Загрузка данных...</td></tr>';
    
    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                document.getElementById('logsTableBody').innerHTML = `<tr><td colspan="5" class="text-center py-5 text-danger">Ошибка: ${data.error}</td></tr>`;
                return;
            }
            renderLogs(data.logs);
            renderPagination(data.total_pages, data.current_page, data.total_count);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('logsTableBody').innerHTML = `<tr><td colspan="5" class="text-center py-5 text-danger">Ошибка загрузки данных</td></tr>`;
        });
}

function formatDateString(dateStr) {
    // dateStr usually "YYYY-MM-DD HH:MM:SS"
    if (!dateStr) return '';
    try {
        const parts = dateStr.split(' ');
        if (parts.length === 2) {
            const dateParts = parts[0].split('-');
            const timeParts = parts[1].split(':');
            if (dateParts.length === 3 && timeParts.length >= 2) {
                return `${dateParts[2]}.${dateParts[1]}.${dateParts[0]} ${timeParts[0]}:${timeParts[1]}`;
            }
        }
    } catch (e) {}
    return dateStr;
}

function getRoleBadge(role) {
    if (role === 'superadmin') return '<span style="display: inline-block; width: 90px; text-align: center; background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; font-size: 10px; padding: 0.125rem 0; border-radius: 0.25rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.025em;">Админ</span>';
    if (role === 'editor') return '<span style="display: inline-block; width: 90px; text-align: center; background-color: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; font-size: 10px; padding: 0.125rem 0; border-radius: 0.25rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.025em;">Редактор</span>';
    if (role === 'viewer') return '<span style="display: inline-block; width: 90px; text-align: center; background-color: #f0fdfa; color: #0d9488; border: 1px solid #ccfbf1; font-size: 10px; padding: 0.125rem 0; border-radius: 0.25rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.025em;">Наблюдатель</span>';
    if (role === 'analyst') return '<span style="display: inline-block; width: 90px; text-align: center; background-color: #fefce8; color: #ca8a04; border: 1px solid #fef08a; font-size: 10px; padding: 0.125rem 0; border-radius: 0.25rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.025em;">Аналитик</span>';
    return '<span style="display: inline-block; width: 90px; text-align: center; background-color: #f9fafb; color: #4b5563; border: 1px solid #e5e7eb; font-size: 10px; padding: 0.125rem 0; border-radius: 0.25rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.025em;">Пользователь</span>';
}

function getActionLabel(action) {
    let text = action;
    if (action === 'LOGIN') text = 'Вход в систему';
    else if (action === 'LOGOUT') text = 'Выход из системы';
    else if (action === 'CREATE') text = 'Создание записи';
    else if (action === 'UPDATE') text = 'Обновление данных';
    else if (action === 'DELETE') text = 'Удаление записи';
    else if (action === 'UPLOAD') text = 'Загрузка файла';
    else if (action === 'EXPORT') text = 'Экспорт данных';
    
    return `<span style="display: flex; align-items: center; gap: 0.375rem; color: #4b5563; font-size: 12px; font-weight: 500; white-space: nowrap;">
                <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background-color: #d1d5db;"></span>
                ${text}
            </span>`;
}

function renderLogs(logs) {
    const tbody = document.getElementById('logsTableBody');
    if (!logs || logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">Записи отсутствуют</td></tr>';
        return;
    }

    let html = '';
    logs.forEach(log => {
        let detailsHtml = log.details || '';
        if (log.entity_id) {
            detailsHtml += ` <span class="text-muted ms-1">(ID: ${log.entity_id})</span>`;
        }

        html += `
            <tr style="transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#f9fafb'" onmouseout="this.style.backgroundColor='transparent'">
                <td style="color: #6b7280; font-size: 0.875rem; white-space: nowrap;">
                    ${formatDateString(log.created_at)}
                </td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        ${getRoleBadge(log.role)}
                        <span style="font-weight: 600; font-size: 0.875rem; color: #1f2937;">${log.username}</span>
                    </div>
                </td>
                <td>${getActionLabel(log.action)}</td>
                <td style="color: #4b5563; font-size: 0.875rem;">${detailsHtml}</td>
                <td style="color: #6b7280; font-size: 0.8125rem; font-family: monospace;">${log.ip_address || ''}</td>
            </tr>
        `;
    });
    tbody.innerHTML = html;
}

function renderPagination(totalPages, currentPage, totalCount) {
    document.getElementById('logsInfo').textContent = `Всего записей: ${totalCount}`;
    
    const container = document.getElementById('logsPagination');
    if (totalPages <= 1) {
        container.innerHTML = '';
        return;
    }

    let html = '';
    
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchLogs(${currentPage - 1})">Назад</button>`;
    
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);
    
    if (startPage > 1) {
        html += `<button class="page-btn" onclick="fetchLogs(1)">1</button>`;
        if (startPage > 2) html += `<span class="px-1 text-muted">...</span>`;
    }
    
    for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="fetchLogs(${i})">${i}</button>`;
    }
    
    if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="px-1 text-muted">...</span>`;
        html += `<button class="page-btn" onclick="fetchLogs(${totalPages})">${totalPages}</button>`;
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchLogs(${currentPage + 1})">Вперед</button>`;
    
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
    // Начальная загрузка первой страницы
    if (document.getElementById('logsTableBody')) {
        fetchLogs(1);
    }

    // Поиск с debounce
    const searchInput = document.getElementById('customSearchInput');
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            clearTimeout(logsDebounceTimer);
            logsSearchQuery = this.value;
            logsDebounceTimer = setTimeout(() => {
                fetchLogs(1);
            }, 300);
        });
    }
});

function clearLogs() {
    if (confirm('Вы уверены, что хотите очистить весь журнал действий? Это действие нельзя отменить.')) {
        const csrfTokenMatch = document.querySelector('meta[name="csrf-token"]');
        const csrfToken = csrfTokenMatch ? csrfTokenMatch.getAttribute('content') : '';
        
        fetch("{{ url_for('admin.clear_logs') }}", {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            }
        }).then(res => {
            if (res.ok) {
                fetchLogs(1); // Перезагружаем первую страницу без перезагрузки всей админки
            } else {
                alert('Ошибка при очистке журнала');
            }
        });
    }
}
</script>
