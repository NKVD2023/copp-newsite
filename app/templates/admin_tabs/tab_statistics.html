<div class="a-panel">
    <div class="a-panel-toolbar">
        <h6 class="a-panel-title mb-0" style="border:none;padding:0;"><i class="fas fa-square-poll-vertical"></i> Показатели статистики</h6>
        <div class="a-search-box" style="width:260px;">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" class="a-search-input generic-search-input" data-target=".stat-row" placeholder="Поиск по показателю...">
        </div>
    </div>

    <form action="/admin/statistics" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="a-table-responsive">
            <table class="a-table">
                <thead>
                    <tr>
                        <th style="width:60px;">ID</th>
                        <th>Показатель (Метка)</th>
                        <th style="width:140px;">Значение</th>
                        <th style="width:140px;">Порядок</th>
                    </tr>
                </thead>
                <tbody>
                    {% for stat in stats_list %}
                    <tr class="stat-row">
                        <td style="color:#8a9ab0; font-size:0.8rem;">
                            {{ stat.id }}
                            <input type="hidden" name="id" value="{{ stat.id }}">
                        </td>
                        <td class="search-text">
                            <input type="text" name="label" value="{{ stat.label }}" class="a-input" required>
                        </td>
                        <td>
                            <input type="number" name="value" value="{{ stat.value }}" class="a-input" required>
                        </td>
                        <td>
                            <input type="number" name="display_order" value="{{ stat.display_order }}" class="a-input" required>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="a-empty"><i class="fas fa-chart-simple"></i><p>Нет показателей статистики</p></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="mt-3">
            <button type="submit" class="a-btn a-btn-primary" {% if not stats_list %}disabled{% endif %}>
                <i class="fas fa-floppy-disk"></i> Сохранить изменения
            </button>
        </div>
    </form>
</div>
