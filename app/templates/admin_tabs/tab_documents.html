<div class="a-panel" style="margin-bottom:14px;">
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <div class="a-search-box" style="flex:1; min-width:220px; max-width:400px;">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" class="a-search-input generic-search-input" data-target=".media-item-searchable" placeholder="Поиск файлов по названию...">
        </div>
        <div style="margin-left:auto;">
            <button class="a-btn a-btn-accent" onclick="toggleDocsForm()">
                <i class="fas fa-upload"></i> Загрузить файл
            </button>
        </div>
    </div>
</div>

<div id="docs-form-container" class="news-form-wrapper" style="display: none;">
    <div class="modern-form-card">
        
        <div class="form-header">
            <h2>Загрузка нового файла</h2>
            <button type="button" class="btn-cancel" onclick="toggleDocsForm()"><i class="fas fa-times"></i> Отмена</button>
        </div>

        <form action="{{ url_for('admin.upload_document') }}" method="POST" enctype="multipart/form-data" id="uploadDropZone" class="upload-dropzone p-5 text-center border rounded mb-3" style="border: 2px dashed #00334e !important; cursor: pointer; transition: background 0.3s; background: #fafafa;">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="form-group mb-0">
                <i class="fas fa-cloud-upload-alt fa-3x text-secondary mb-3"></i>
                <h5 class="mb-2">Нажмите или перетащите файлы сюда</h5>
                <input type="file" name="document" id="fileInputDrop" class="d-none" multiple required>
                <div id="fileNameDisplay" class="mt-2 text-success fw-bold"></div>
                <small class="text-muted d-block mt-2">Разрешены: pdf, doc, docx, xls, xlsx, zip, rar, txt, rtf, png, jpg, jpeg, webp</small>
            </div>
            <button type="submit" class="btn btn-primary mt-3 px-4 d-none" id="submitDropBtn"><i class="fas fa-save"></i> Загрузить</button>
        </form>
    </div>
</div>

<div class="card mt-4 shadow-sm border-0">
    <div class="card-header bg-white border-bottom-0 pt-3 pb-0 px-4">
        <ul class="nav nav-tabs" id="mediaTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="gallery-tab" data-bs-toggle="tab" data-bs-target="#gallery-pane" type="button" role="tab" aria-controls="gallery-pane" aria-selected="true">
                    <i class="fas fa-images me-1"></i> Галерея изображений
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="docs-tab" data-bs-toggle="tab" data-bs-target="#docs-pane" type="button" role="tab" aria-controls="docs-pane" aria-selected="false">
                    <i class="fas fa-file-alt me-1"></i> Документы и Архивы
                </button>
            </li>
        </ul>
    </div>
    <div class="card-body p-4">
        <div class="tab-content" id="mediaTabsContent">
            <!-- Вкладка Галерея -->
            <div class="tab-pane fade show active" id="gallery-pane" role="tabpanel" aria-labelledby="gallery-tab">
                {% include 'admin_tabs/components/docs_gallery.html' %}
            </div>
            
            <!-- Вкладка Документы -->
            <div class="tab-pane fade" id="docs-pane" role="tabpanel" aria-labelledby="docs-tab">
                {% include 'admin_tabs/components/docs_table.html' %}
            </div>
        </div>
    </div>
</div>

<script>
    function toggleDocsForm() {
        const form = document.getElementById('docs-form-container');
        form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
    }
    
    function copyLink(url) {
        const fullUrl = window.location.origin + url;
        navigator.clipboard.writeText(fullUrl).then(() => {
            alert('Ссылка скопирована: ' + fullUrl);
        }).catch(err => {
            console.error('Ошибка копирования', err);
            alert('Не удалось скопировать ссылку.');
        });
    }

    // Drag and drop upload logic
    const dropZone = document.getElementById('uploadDropZone');
    const fileInput = document.getElementById('fileInputDrop');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const submitBtn = document.getElementById('submitDropBtn');

    if (dropZone && fileInput) {
        dropZone.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {
                fileInput.click();
            }
        });
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = 'rgba(0, 51, 78, 0.05)';
            dropZone.style.borderColor = '#0066ff';
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = '#fafafa';
            dropZone.style.borderColor = '#00334e';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.backgroundColor = '#fafafa';
            dropZone.style.borderColor = '#00334e';
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                updateFileInfo();
            }
        });

        fileInput.addEventListener('change', updateFileInfo);

        function updateFileInfo() {
            if (fileInput.files.length > 0) {
                if (fileInput.files.length === 1) {
                    fileNameDisplay.innerHTML = '<i class="fas fa-check-circle"></i> Выбран файл: ' + fileInput.files[0].name;
                } else {
                    fileNameDisplay.innerHTML = '<i class="fas fa-check-circle"></i> Выбрано файлов: ' + fileInput.files.length;
                }
                submitBtn.classList.remove('d-none');
            } else {
                fileNameDisplay.innerHTML = '';
                submitBtn.classList.add('d-none');
            }
        }
    }
</script>
