<div class="news-module">

    <div class="news-header-panel" style="display:flex; justify-content:space-between; align-items:center;">
        <div class="news-search-box" style="flex:1; max-width:400px; margin-right: 20px;">
            <span class="search-icon">🔍</span>
            <input type="text" class="generic-search-input" data-target=".media-card" placeholder="Поиск файлов по названию...">
        </div>
        <div style="display:flex; gap: 10px;">
            <button class="btn-create-news" onclick="toggleDocsForm()">+ Загрузить документ</button>
        </div>
    </div>

<div id="docs-form-container" class="news-form-wrapper" style="display: none;">
    <div class="modern-form-card">
        
        <div class="form-header">
            <h2>Загрузка нового документа</h2>
            <button type="button" class="btn-cancel" onclick="toggleDocsForm()">Отмена</button>
        </div>

        <form action="/admin/upload_document" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label>Выберите файл</label>
                <div class="file-upload-box">
                    <input type="file" name="document" required>
                </div>
                <small style="color:#666;">Разрешены: pdf, doc, docx, xls, xlsx, zip, rar, txt, rtf</small>
            </div>

            <button type="submit" class="btn-submit-large">Загрузить документ</button>
        </form>
    </div>
</div>
</div>

<div class="media-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
    {% for file in all_media_files %}
    <div class="media-card" style="background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column;">
        <div class="media-preview" style="height: 140px; background: #f4f7f6; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 1px solid #eee;">
            {% if file.is_image %}
                <img src="{{ url_for('static', filename=file.filepath) }}" style="width: 100%; height: 100%; object-fit: cover;" alt="{{ file.filename }}">
            {% else %}
                <div style="font-size: 48px; color: #a1b0b8;">📄</div>
            {% endif %}
        </div>
        
        <div class="media-info" style="padding: 10px; flex: 1; display: flex; flex-direction: column;">
            <div class="search-text" style="font-weight: 600; font-size: 0.9rem; color: #333; margin-bottom: 5px; word-break: break-all; line-height: 1.2;" title="{{ file.filename }}">{{ file.filename }}</div>
            <div style="font-size: 0.8rem; color: #777; margin-bottom: 2px;">📁 {{ file.folder }}</div>
            <div style="font-size: 0.8rem; color: #777; margin-bottom: 2px;">{{ file.size_kb }} KB</div>
            <div style="font-size: 0.8rem; color: #999;">{{ file.date_str }}</div>
            
            <div style="margin-top: auto; padding-top: 10px; display: flex; gap: 5px;">
                <button type="button" class="btn btn-sm btn-outline-primary" style="flex:1; padding: 2px 5px; font-size: 0.8rem;" onclick="copyLink('{{ url_for('static', filename=file.filepath) }}')">Копировать</button>
                <form action="{{ url_for('admin.delete_media') }}" method="POST" style="flex:1; margin:0;" onsubmit="return confirm('Вы уверены? Если файл используется на сайте, он перестанет отображаться.');">
                    <input type="hidden" name="filepath" value="{{ file.filepath }}">
                    <button type="submit" class="btn btn-sm btn-outline-danger" style="width: 100%; padding: 2px 5px; font-size: 0.8rem;">Удалить</button>
                </form>
            </div>
        </div>
    </div>
    {% else %}
    <div style="grid-column: 1 / -1; text-align: center; color: #777; padding: 40px;">
        Нет загруженных файлов.
    </div>
    {% endfor %}
</div>

<script>
    function toggleDocsForm() {
        const form = document.getElementById('docs-form-container');
        form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
    }
    
    function copyLink(url) {
        const fullUrl = window.location.origin + url;
        navigator.clipboard.writeText(fullUrl).then(() => {
            alert('Ссылка скопирована: ' + fullUrl);
        }).catch(err => {
            console.error('Ошибка копирования', err);
            alert('Не удалось скопировать ссылку.');
        });
    }
</script>
