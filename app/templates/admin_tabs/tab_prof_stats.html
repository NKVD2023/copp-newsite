<div class="a-panel">
    <div class="a-panel-toolbar">
        <h6 class="a-panel-title mb-0" style="border:none;padding:0;"><i class="fas fa-chart-bar"></i> Статистика профессий (Дашборд)</h6>
        <a href="{{ url_for('main.dashboard') }}" target="_blank" class="a-btn a-btn-outline a-btn-sm">
            <i class="fas fa-arrow-up-right-from-square"></i> Перейти на дашборд
        </a>
    </div>


    <div class="trudvsem-sync-box" style="background:#f8f9fa; border:1px solid #dee2e6; border-radius:8px; padding:15px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h6 style="margin:0 0 5px 0; color:#333;"><i class="fas fa-cloud-arrow-down" style="color:#0056b3;"></i> Синхронизация с порталом «Работа в России»</h6>
            <p style="margin:0; font-size:0.85rem; color:#666;">Автоматически скачивает все открытые вакансии по региону Крым. Текущие данные будут заменены новыми.</p>
            
            <div id="syncStatusUI" style="display:none; margin-top:12px; background:#fff; border:1px solid #c8ddff; border-radius:6px; padding:12px; border-left:4px solid #0056b3;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; align-items:center;">
                    <strong id="syncStatusText" style="font-size:0.9rem; color:#0056b3; margin:0;">Ожидание...</strong>
                </div>
                <div style="height:8px; background:#e9ecef; border-radius:4px; overflow:hidden;">
                    <div id="syncProgressBar" style="height:100%; width:0%; background:#0056b3; transition:width 0.4s ease;"></div>
                </div>
            </div>
        </div>
        <div style="margin-left:20px;">
            <button id="btnStartSync" class="a-btn" style="background:#0056b3; color:white; font-weight:500;" onclick="startSync()">
                <i class="fas fa-sync" id="syncIcon"></i> Синхронизировать
            </button>
        </div>
    </div>
</div>

<script>
    let syncPollInterval = null;

    function startSync() {
        if(!confirm('Запустить синхронизацию? Это займет около минуты.')) return;
        
        setUIState('running', 'Запуск процесса...', 5);

        fetch("{{ url_for('admin.trudvsem_sync') }}", {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token() }}' }
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                if(!syncPollInterval) syncPollInterval = setInterval(pollSyncStatus, 1500);
            }
        })
        .catch(err => {
            setUIState('error', 'Ошибка сети при запуске', 100);
        });
    }

    function setUIState(state, message, progressPct) {
        const ui = document.getElementById('syncStatusUI');
        const text = document.getElementById('syncStatusText');
        const bar = document.getElementById('syncProgressBar');
        const btn = document.getElementById('btnStartSync');
        const icon = document.getElementById('syncIcon');
        
        ui.style.display = 'block';
        text.innerText = message;
        
        if (progressPct !== null) {
            bar.style.width = progressPct + '%';
        }

        if (state === 'running') {
            text.style.color = '#0056b3';
            ui.style.borderLeftColor = '#0056b3';
            bar.style.background = '#0056b3';
            btn.disabled = true;
            icon.classList.add('fa-spin');
        } else if (state === 'finished') {
            text.style.color = '#28a745';
            ui.style.borderLeftColor = '#28a745';
            bar.style.background = '#28a745';
            btn.disabled = false;
            icon.classList.remove('fa-spin');
            if(syncPollInterval) { clearInterval(syncPollInterval); syncPollInterval = null; }
        } else if (state === 'error') {
            text.style.color = '#dc3545';
            ui.style.borderLeftColor = '#dc3545';
            bar.style.background = '#dc3545';
            btn.disabled = false;
            icon.classList.remove('fa-spin');
            if(syncPollInterval) { clearInterval(syncPollInterval); syncPollInterval = null; }
        } else if (state === 'idle') {
            ui.style.display = 'none';
        }
    }

    function pollSyncStatus() {
        fetch("{{ url_for('admin.trudvsem_sync_status') }}")
        .then(res => res.json())
        .then(data => {
            if(data.status === 'running') {
                let pct = 10;
                if(data.total > 0 && data.downloaded > 0) {
                    pct = Math.min(95, Math.round((data.downloaded / data.total) * 100));
                }
                setUIState('running', data.message || "Скачивание...", pct);
            } else if(data.status === 'finished') {
                setUIState('finished', data.message || "Синхронизация завершена!", 100);
            } else if(data.status === 'error') {
                setUIState('error', data.message || "Произошла ошибка", 100);
            } else {
                if(syncPollInterval) { clearInterval(syncPollInterval); syncPollInterval = null; }
            }
        })
        .catch(err => console.log(err));
    }
    
    // Check status on load in case it's already running
    fetch("{{ url_for('admin.trudvsem_sync_status') }}")
        .then(res => res.json())
        .then(data => {
            if(data.status === 'running') {
                setUIState('running', data.message || "Скачивание...", 10);
                if(!syncPollInterval) syncPollInterval = setInterval(pollSyncStatus, 1500);
            } else if(data.status === 'finished') {
                setUIState('finished', data.message || "Синхронизация завершена!", 100);
            } else if(data.status === 'error') {
                setUIState('error', data.message || "Произошла ошибка", 100);
            }
        });
</script>
</div>
